<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPL Energy Savings Game</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;700&family=Inter:wght@700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container-fluid">
        <!-- Skip link for accessibility -->
        <a href="#gameBoard" class="skip-link">Skip to game board</a>
        
        <!-- Game Board - First and centered -->
        <main class="game-container" role="main" aria-label="Energy savings matching game">
          
                    <div id="gameBoard" class="game-board" role="grid" aria-label="Game cards">
                        <!-- Cards will be generated here -->
                    </div>
              
        </main>

        <!-- Score Badge - Second -->
        <div class="score-section">
            <div class="score-container">
                <div class="score-badge">
                    <span class="score-label">Found</span>
                    <span>
                    <span class="score-value" id="matches">0</span> <span class="score-value">/6</span>
                    </span>
                </div>
            </div>
        </div>

        <!-- Title and Subtitle - Third -->
        <div class="text-section">
            <h1 class="main-title">Can you pick the places where your home could save more energy?</h1>
            <p class="subtitle">Match two and discover an easy tip to help you get started.</p>
        </div>

        <!-- PPL Logo Footer - Bottom right -->
        <footer class="ppl-footer">
            <div class="ppl-logo">
                <img src="images/ppl-logo.svg" alt="PPL Logo" class="logo-img">
            </div>
        </footer>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
